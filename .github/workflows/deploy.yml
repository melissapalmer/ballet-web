name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Replace __VERSION__ in index.html with the short commit SHA so that
      # browsers see fresh URLs for styles.css / app.js on every push and
      # don't keep serving cached copies.
      - name: Inject commit SHA as cache-buster
        run: |
          VERSION=$(git rev-parse --short HEAD)
          sed -i "s/__VERSION__/$VERSION/g" index.html
          echo "Pinned to version: $VERSION"
          grep -E '\?v=' index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
